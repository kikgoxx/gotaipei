<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Taipei Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
.chat-launcher { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #ff6b35, #feca57); border: none; cursor: pointer; box-shadow: 0 4px 20px #ff6b3555; z-index: 99998; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: transform 0.2s, box-shadow 0.2s; }
.chat-launcher:hover { transform: scale(1.1); box-shadow: 0 6px 25px #ff6b3588; }
.chat-launcher.active { transform: rotate(45deg); }
.chat-popup { position: fixed; bottom: 96px; right: 24px; width: 360px; height: 520px; background: #fff; border-radius: 16px; box-shadow: 0 8px 40px #0003; z-index: 99999; display: none; flex-direction: column; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
.chat-popup.open { display: flex; }
.chat-header { background: linear-gradient(135deg, #1a5276, #2e86ab); color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
.chat-header-title { font-size: 16px; font-weight: bold; }
.chat-header-sub { font-size: 12px; opacity: 0.8; }
.chat-close { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 0; line-height: 1; opacity: 0.8; }
.chat-close:hover { opacity: 1; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: #f0f2f5; display: flex; flex-direction: column; gap: 10px; }
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
.msg.bot { background: #fff; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px #0001; }
.msg.user { background: linear-gradient(135deg, #ff6b35, #ff8c5a); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.qr-btn { background: #fff; border: 1.5px solid #2e86ab; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #2e86ab; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.qr-btn:hover { background: #2e86ab; color: #fff; }
.booking-form { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; width: 100%; }
.booking-form input, .booking-form select, .booking-form textarea { width: 100%; padding: 9px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; background: #fff; color: #333; outline: none; transition: border-color 0.2s; }
.booking-form input:focus, .booking-form select:focus, .booking-form textarea:focus { border-color: #ff6b35; }
.booking-form textarea { resize: vertical; min-height: 60px; }
.booking-form label { font-size: 12px; color: #666; font-weight: 500; }
.booking-form .radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
.booking-form .radio-group label { display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 13px; color: #333; }
.booking-form .radio-group input[type="radio"] { width: auto; }
.booking-form .submit-btn { background: linear-gradient(135deg, #ff6b35, #ff8c5a); color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; }
.booking-form .submit-btn:hover { opacity: 0.85; }
.booking-form .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.chat-input-area { padding: 12px 16px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: flex-end; }
.chat-input-area textarea { flex: 1; resize: none; border: 1.5px solid #ddd; border-radius: 20px; padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; max-height: 80px; transition: border-color 0.2s; }
.chat-input-area textarea:focus { border-color: #ff6b35; }
.chat-send { background: linear-gradient(135deg, #ff6b35, #ff8c5a); border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; flex-shrink: 0; }
.waiting-badge { background: #fff3ee; border: 1.5px solid #ff6b35; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #2c3e50; margin-top: 8px; line-height: 1.7; }
.fallback-badge { background: #fff3cd; border: 1.5px solid #ffc107; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #856404; margin-top: 8px; line-height: 1.7; }
@media (max-width: 480px) {
  .chat-launcher { bottom: 16px; right: 16px; width: 54px; height: 54px; font-size: 24px; }
  .chat-popup { width: 100%; height: 100vh; bottom: 0; right: 0; border-radius: 0; position: fixed; }
}
</style>
</head>
<body>
<button class="chat-launcher" id="chatLauncher">&#x1F4AC;</button>
<div class="chat-popup" id="chatPopup">
  <div class="chat-header">
    <div><div class="chat-header-title">Go Taipei Bot</div><div class="chat-header-sub">Go Taipei</div></div>
    <button class="chat-close" id="chatClose">&#x2715;</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <textarea id="chatInput" placeholder="พิมพ์คำถาม..." rows="1"></textarea>
    <button class="chat-send" id="chatSend">&#x25C4;</button>
  </div>
</div>
<script>
(function() {
  // Google AppsScript URL - ส่งข้อมูลไปที่นี่
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbzZgQOD8BX8g0MpJXyBc6vz_1lHSMsDOO1ra2kBwxLsJkeAkK9tDQ_5Xt9oQQv9fG6IWQ/exec';

  var currentStep = 'welcome';
  var bookingData = {};
  var pendingEscalation = null;
  var isSubmitting = false;
  var popupOpen = false;

  var tours = [
    { id: 'jiufen-yehliu',  label: '1. จิ่วเฟิ่น, ท่าเรือเจิ้งปิน, เยว่หลิว, สือเฟิ่น' },
    { id: 'sunmoonlake',    label: '2. ซันมูนเลค (Sun Moon Lake)' },
    { id: 'citytour',       label: '3. ทัวร์ในไทเป (Taipei City Tour)' },
    { id: 'yangmingshan',  label: '4. หยางหมิงซาน, เป่ยโถว, ตั้นสุ่ย' },
    { id: 'alishan',        label: '5. อุทยานอาลีซาน (Alishan) 2 วัน 1 คืน' },
    { id: 'carrental',     label: '6. เช่ารถเที่ยวค้างคืนนอกไทเป' },
  ];

  var launcher = document.getElementById('chatLauncher');
  var popup    = document.getElementById('chatPopup');
  var closeBtn = document.getElementById('chatClose');
  var messages = document.getElementById('chatMessages');
  var input    = document.getElementById('chatInput');
  var sendBtn  = document.getElementById('chatSend');

  launcher.addEventListener('click', function() {
    popupOpen = !popupOpen;
    popup.classList.toggle('open', popupOpen);
    if (popupOpen && messages.children.length === 0) sendWelcome();
  });
  closeBtn.addEventListener('click', function() {
    popupOpen = false;
    popup.classList.remove('open');
    launcher.classList.remove('active');
  });

  function sendMsg(text, cls, extraHtml) {
    cls = cls || 'bot';
    extraHtml = extraHtml || '';
    var div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.innerHTML = text + extraHtml;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }
  function sendBot(text, extraHtml) { return sendMsg(text, 'bot', extraHtml); }
  function sendUser(text) { return sendMsg(text, 'user'); }

  function sendQuickReplies(labels) {
    var html = '<div class="quick-replies">' +
      labels.map(function(l) {
        return '<button class="qr-btn" onclick="handleQR(\'' + l.replace(/'/g, "\\'") + '\')">' + l + '</button>';
      }).join('') + '</div>';
    return sendBot('', html);
  }

  function showFallback(type) {
    var html = '';
    if (type === 'submit') {
      html = '<div class="fallback-badge">⚠️ ขออภัยไม่สามารถส่งข้อมูลได้ในขณะนี้\n\n' +
        '📱 กรุณาติดต่อทาง LINE ด้วยตนเอง:\n' +
        ' <strong>LINE:</strong> @966kmony\n' +
        ' • <strong>WhatsApp:</strong> 087-519-8224\n' +
        ' • <strong>Facebook:</strong> Go Taipei\n\n' +
        '📞 ตลอด24ชม.: +886 96-881-7739</div>';
    } else if (type === 'pending') {
      html = '<div class="fallback-badge">⚠️ ขออภัยไม่สามารถส่งข้อมูลได้ในขณะนี้\n\n' +
        '📱 กรุณาติดต่อทาง LINE ด้วยตนเอง:\n' +
        ' <strong>LINE:</strong> @966kmony\n' +
        ' • <strong>WhatsApp:</strong> 087-519-8224\n' +
        ' • <strong>Facebook:</strong> Go Taipei</div>';
    }
    return html;
  }

  function sendToBackend(text, onSuccess, onFallback) {
    var controller = new AbortController();
    var timer = setTimeout(function() { controller.abort(); }, 10000);

    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text }),
      signal: controller.signal,
    }).then(function(r) {
      clearTimeout(timer);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      if (onSuccess) onSuccess();
    }).catch(function(err) {
      clearTimeout(timer);
      if (onFallback) onFallback();
    });
  }

  function sendWelcome() {
    currentStep = 'welcome';
    sendBot('สวัสดีค่ะ ยินดีต้อนรับสู่ Go Taipei ค่ะ\n\n' +
      'ทัวร์ยอดนิยม:\n' +
      '• จิ่วเฟิ่น + เยว่หลิว\n' +
      '• ซันมูนเลค\n' +
      '• ทัวร์ในไทเป\n' +
      '• อลีซาน 2 วัน 1 คืน\n\n' +
      'ดูรายละเอียดเพิ่มเติมได้ที่ gotaipei.net ค่ะ\n\n' +
      '📱 หากมีคำถามด่วน ติดต่อทาง LINE: @966kmony ได้เลยนะคะ ไม่ต้องรอนานค่ะ');
    sendQuickReplies(['📋 จองทัวร์', '💰 ราคาเท่าไหร่', '🚗 ประเภทรถ', '♿ สิทธิพิเศษ']);
  }

  window.handleQR = function(label) {
    sendUser(label);
    if (label.indexOf('จอง') !== -1) {
      startBooking();
    } else if (label.indexOf('ราคา') !== -1) {
      sendBot('ราคาทัวร์ (ราคาต่อคัน รวมน้ำมัน ทางด่วน คนขับ):\n\n' +
        '• จิ่วเฟิ่น: 4,500-5,000 บาท\n' +
        '• ซันมูนเลค: 7,000-9,000 บาท\n' +
        '• ทัวร์ในไทเป: 4,500-5,000 บาท\n' +
        '• หยางหมิงซาน: 7,000-8,500 บาท\n' +
        '• อลีซาน: 7,000-8,500 บาท/วัน\n\n' +
        'ราคาข้างต้นเป็นราคาประมาณ สำหรับรถเก๋ง (4 ท่าน) ค่ะ');
      sendQuickReplies(['📋 จองทัวร์', '📱 ติดต่อ LINE']);
    } else if (label.indexOf('รถ') !== -1) {
      sendBot('ประเภทรถ:\n\n' +
        '• รถเก๋ง 4 ที่นั่ง: Toyota Cross / Altis\n' +
        '• รถตู้ 7-9 ที่นั่ง: VW Caravelle / Benz Vito / H1\n' +
        '• มินิบัส: ไม่แน่นอน 20 คน\n\n' +
        'คนขับพูดไทยได้ (รถตู้) ค่ะ รถเก๋งพูดอังกฤษเป็นหลัก\n' +
        'หมายเหตุ: ไม่บังคับทิป ตามความสมัครใจค่ะ\n\n' +
        '📱 สอบถามเพิ่มเติม LINE: @966kmony');
      sendQuickReplies(['📋 จองทัวร์', '📱 ติดต่อ LINE']);
    } else if (label.indexOf('สิทธิ') !== -1 || label.indexOf('พิเศษ') !== -1) {
      sendBot('สิทธิพิเศษ:\n\n' +
        '• วีลแชร์: รองรับ (แจ้งล่วงหน้าค่ะ)\n' +
        '• คาร์ซีท: มีให้บริการ (แจ้งล่วงหน้าค่ะ)\n' +
        '• สัตว์เลี้ยง: ไม่แนะนำในรถตู้\n\n' +
        'กรุณาแจ้งล่วงหน้าอย่างน้อย 1 วันค่ะ');
      sendQuickReplies(['📋 จองทัวร์', '📱 ติดต่อ LINE']);
    }
  };

  function startBooking() {
    currentStep = 'booking';
    bookingData = {};
    var tourOptions = tours.map(function(t) {
      return '<option value="' + t.id + '">' + t.label + '</option>';
    }).join('');
    var html = '<div class="booking-form">' +
      '<label>ชื่อ-นามสกุล *</label>' +
      '<input type="text" id="bf-name" placeholder="ชื่อ-นามสกุล" />' +
      '<label>วันที่ต้องการเดินทาง *</label>' +
      '<input type="date" id="bf-date" />' +
      '<label>จำนวน *</label>' +
      '<input type="number" id="bf-pax" placeholder="1" min="1" />' +
      '<label>โปรแกรมทัวร์</label>' +
      '<select id="bf-tour">' + tourOptions + '</select>' +
      '<label>ประเภทรถ</label>' +
      '<div class="radio-group">' +
        '<label><input type="radio" name="bf-vehicle" value="sedan" checked> เก๋ง (1-4 คน)</label>' +
        '<label><input type="radio" name="bf-vehicle" value="van"> ตู้ (5-8 คน)</label>' +
      '</div>' +
      '<label>หมายเหตุ (ไม่บังคับ)</label>' +
      '<textarea id="bf-note" placeholder="รายละเอียดเพิ่มเติม..."></textarea>' +
      '<button class="submit-btn" id="bf-submit" onclick="submitBooking()">ส่งข้อมูลจอง</button>' +
      '</div>';
    sendBot('กรุณากรอกข้อมูลจองทัวร์ค่ะ:', html);
  }

  window.submitBooking = function() {
    if (isSubmitting) return;
    bookingData = {
      name:    document.getElementById('bf-name').value.trim(),
      date:    document.getElementById('bf-date').value,
      pax:     document.getElementById('bf-pax').value,
      tour:    document.getElementById('bf-tour').value,
      vehicle: (document.querySelector('input[name="bf-vehicle"]:checked') || {value:'sedan'}).value,
      note:    document.getElementById('bf-note').value.trim(),
    };
    if (!bookingData.name || !bookingData.date || !bookingData.pax) {
      sendBot('กรุณากรอกชื่อ วันที่ และจำนวน ให้ครบถ้วนค่ะ');
      return;
    }
    var btn = document.getElementById('bf-submit');
    btn.disabled = true;
    btn.textContent = 'กำลังส่ง...';
    isSubmitting = true;
    var tourObj = tours.find(function(t){ return t.id === bookingData.tour; });
    var vehicleLabel = { sedan: 'เก๋ง', van: 'ตู้' }[bookingData.vehicle] || 'เก๋ง';
    var telegramText = '📋 [จองทัวร์จากเว็บไซต์]\n\n' +
      '• ชื่อ: ' + bookingData.name + '\n' +
      '• ทัวร์: ' + (tourObj ? tourObj.label : bookingData.tour) + '\n' +
      '• วันที่: ' + bookingData.date + '\n' +
      '• จน.: ' + bookingData.pax + ' คน\n' +
      '• รถ: ' + vehicleLabel +
      (bookingData.note ? '\n• หมายเหตุ: ' + bookingData.note : '');
    sendToBackend(telegramText,
      function() {
        currentStep = 'confirm_booking';
        sendBot('✅ รับข้อมูลแล้วค่ะ\n\n' +
          '📋 Booking ID จะส่งให้ท่านทาง LINE ภายใน 5-10 นาที\n\n' +
          '📱 ขอบคุณค่ะ ทาง LINE จะติดต่อกลับภายในไม่กี่ชั่วโมงค่ะ');
        sendQuickReplies(['📱 ติดต่อ LINE', 'จองอื่นอีก']);
        isSubmitting = false;
        btn.disabled = false;
        btn.textContent = 'ส่งข้อมูลจอง';
      },
      function() {
        currentStep = 'confirm_booking';
        sendBot('✅ รับข้อมูลแล้วค่ะ');
        sendBot('', showFallback('submit'));
        isSubmitting = false;
        btn.disabled = false;
        btn.textContent = 'ส่งข้อมูลจอง';
      }
    );
  };

  function handlePendingReply(text) {
    var pe = pendingEscalation;
    if (pe.neededFields.indexOf('date') !== -1 && !pe.answers.date) {
      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
        pe.answers.date = text;
        pe.neededFields.splice(pe.neededFields.indexOf('date'), 1);
      } else if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(text)) {
        var parts = text.split(/[\/\-]/);
        var y = parts[2];
        if (y && y.length === 2) y = (parseInt(y) > 50 ? '19' : '20') + y;
        pe.answers.date = y + '-' + parts[1].padStart(2,'0') + '-' + parts[0].padStart(2,'0');
        pe.neededFields.splice(pe.neededFields.indexOf('date'), 1);
      }
      if (!pe.answers.date) {
        sendBot('รบกวนระบุวันที่ในรูปแบบ วว/ดด/ปป (เช่น 05/15/2025) ได้ไหมคะ');
        return;
      }
    }
    if (pe.neededFields.indexOf('pax') !== -1 && !pe.answers.pax) {
      var num = parseInt(text);
      if (!isNaN(num) && num > 0) {
        pe.answers.pax = num;
        pe.neededFields.splice(pe.neededFields.indexOf('pax'), 1);
      } else {
        sendBot('กรุณาระบุจำนวนเป็นตัวเลข ไม่ใช่ตัวอักษรค่ะ');
        return;
      }
    }
    if (pe.neededFields.indexOf('tour') !== -1 && !pe.answers.tour) {
      var num = parseInt(text);
      if (num >= 1 && num <= 6) {
        pe.answers.tour = tours[num - 1].id;
        pe.neededFields.splice(pe.neededFields.indexOf('tour'), 1);
      } else {
        sendBot('กรุณาเลือกทัวร์หมายเลข 1-6 ค่ะ');
        return;
      }
    }
    if (pe.neededFields.length > 0) {
      var nextField = pe.neededFields[0];
      var prompts = {
        date: 'วันที่ต้องการเดินทาง (เช่น 05/15/2025)',
        pax:  'จำนวนผู้โดยสารกี่คน',
        tour: 'ทัวร์ที่สนใจหมายเลขไหน? (1-6)',
      };
      sendBot('ขออีกข้อมูลนะคะ:\n' + prompts[nextField]);
      return;
    }
    var tourObj = tours.find(function(t){ return t.id === pe.answers.tour; });
    currentStep = 'confirm_booking';
    var waitingHtml = '<div class="waiting-badge">⏳ ขออนุญาตเช็คข้อมูลสักครู่นะคะ ทาง LINE จะติดต่อกลับภายในไม่กี่ชั่วโมงค่ะ\n\n' +
      '📱 หากต้องการติดต่อเร่งด่วน กดติดต่อทาง LINE ได้เลยค่ะ: @966kmony</div>';
    sendBot('', waitingHtml);
    sendQuickReplies(['📱 ติดต่อ LINE', '📋 จองทัวร์']);
    var telegramText = '🔷 [Escalation จากเว็บไซต์]\n\n' +
      '❓ ลูกค้าถาม:\n"' + pe.question + '"\n\n' +
      '• วันที่: ' + (pe.answers.date || 'ยังไม่ระบุ') + '\n' +
      '• จน.: ' + (pe.answers.pax || 'ยังไม่ระบุ') + ' คน\n' +
      '• ทัวร์: ' + (tourObj ? tourObj.label : 'ยังไม่ระบุ') + '\n\n' +
      '⚠️ คำถามนี้ไม่มีใน FAQ\n\n' +
      '↓ กรุณาตอบลูกค้าทางไลน์ ค่ะ';
    sendToBackend(telegramText,
      function() { pendingEscalation = null; },
      function() {
        sendBot('', showFallback('pending'));
        pendingEscalation = null;
      }
    );
  }

  function handleInput(text) {
    text = text.trim();
    if (!text) return;
    sendUser(text);
    if (currentStep === 'booking') {
      sendBot('กรุณากรอกข้อมูลในแบบฟอร์มข้างบนค่ะ กด "ส่งข้อมูลจอง" เลยค่ะ');
      return;
    }
    if (currentStep === 'confirm_booking') {
      if (text.indexOf('จอง') !== -1 || text.indexOf('เพิ่ม') !== -1) {
        currentStep = 'welcome';
        sendWelcome();
      } else {
        sendBot('มีอะไรให้ช่วยเพิ่มเติมไหมคะ? ขอบคุณค่ะ');
        sendQuickReplies(['📋 จองทัวร์', '📱 ติดต่อ LINE']);
      }
      return;
    }
    if (currentStep === 'pending_info') {
      handlePendingReply(text);
      return;
    }
    if (text.indexOf('จอง') !== -1 || text.indexOf('เช่า') !== -1) {
      startBooking();
    } else if (text.indexOf('ขอบคุณ') !== -1 || text.toLowerCase().indexOf('thank') !== -1) {
      sendBot('ขอบคุณค่ะ มีอะไรให้ช่วยเพิ่มเติมไหมคะ?');
      sendQuickReplies(['📋 จองทัวร์', '📱 ติดต่อ LINE']);
    } else {
      currentStep = 'pending_info';
      pendingEscalation = { question: text, neededFields: ['date', 'pax', 'tour'], answers: {} };
      sendBot('ขออนุญาตเช็คข้อมูลสักครู่นะคะ รบกวนแจ้งข้อมูลเพิ่มเติมหน่อยนะคะ:\n' +
        '• วันที่ต้องการเดินทาง (เช่น 05/15/2025)');
      input.focus();
    }
  }

  sendBtn.addEventListener('click', function() {
    handleInput(input.value);
    input.value = '';
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleInput(input.value);
      input.value = '';
    }
  });
  input.addEventListener('input', function() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 80) + 'px';
  });
})();
</script>
</body>
</html>
