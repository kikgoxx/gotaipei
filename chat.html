<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Taipei Chat</title>
<style>
  /* ===================================
     Go Taipei Chat Widget
     =================================== */

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* --- Floating Launch Button --- */
  .chat-launcher {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff6b35, #feca57);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px #ff6b3555;
    z-index: 99998;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .chat-launcher:hover { transform: scale(1.1); box-shadow: 0 6px 25px #ff6b3588; }
  .chat-launcher.active { transform: rotate(45deg); }

  /* --- Chat Popup --- */
  .chat-popup {
    position: fixed;
    bottom: 96px;
    right: 24px;
    width: 360px;
    height: 520px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 40px #0003;
    z-index: 99999;
    display: none;
    flex-direction: column;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .chat-popup.open { display: flex; }

  /* --- Header --- */
  .chat-header {
    background: linear-gradient(135deg, #1a5276, #2e86ab);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chat-header-title { font-size: 16px; font-weight: bold; }
  .chat-header-sub { font-size: 12px; opacity: 0.8; }
  .chat-close {
    background: none; border: none; color: #fff;
    font-size: 22px; cursor: pointer; padding: 0; line-height: 1;
    opacity: 0.8; transition: opacity 0.2s;
  }
  .chat-close:hover { opacity: 1; }

  /* --- Messages Area --- */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

  .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; }
  .msg.bot { background: #fff; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px #0001; }
  .msg.user { background: linear-gradient(135deg, #ff6b35, #ff8c5a); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }

  .msg-tour-options { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .tour-opt {
    background: #f8f9fa; border: 1.5px solid #e0e0e0; border-radius: 10px;
    padding: 10px 14px; text-align: left; cursor: pointer; font-size: 13px;
    color: #2c3e50; transition: all 0.2s; width: 100%;
  }
  .tour-opt:hover { border-color: #ff6b35; background: #fff; }
  .tour-opt.selected { border-color: #ff6b35; background: #fff3ee; }

  /* --- Quick Reply Buttons --- */
  .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .qr-btn {
    background: #fff; border: 1.5px solid #2e86ab; border-radius: 20px;
    padding: 6px 14px; font-size: 12px; color: #2e86ab; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .qr-btn:hover { background: #2e86ab; color: #fff; }

  /* --- Booking Form --- */
  .booking-form { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; width: 100%; }
  .booking-form input, .booking-form select, .booking-form textarea {
    width: 100%; padding: 9px 12px; border: 1.5px solid #ddd; border-radius: 8px;
    font-size: 13px; font-family: inherit; background: #fff; color: #333;
    outline: none; transition: border-color 0.2s;
  }
  .booking-form input:focus, .booking-form select:focus, .booking-form textarea:focus { border-color: #ff6b35; }
  .booking-form textarea { resize: vertical; min-height: 60px; }
  .booking-form label { font-size: 12px; color: #666; font-weight: 500; }
  .booking-form .radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .booking-form .radio-group label { display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 13px; color: #333; }
  .booking-form .radio-group input[type="radio"] { width: auto; }
  .booking-form .checkboxes { display: flex; flex-wrap: wrap; gap: 10px; }
  .booking-form .checkboxes label { display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 13px; color: #333; }
  .booking-form .checkboxes input[type="checkbox"] { width: auto; }
  .booking-form .submit-btn {
    background: linear-gradient(135deg, #ff6b35, #ff8c5a); color: #fff;
    border: none; border-radius: 10px; padding: 12px; font-size: 14px;
    font-weight: bold; cursor: pointer; width: 100%; transition: opacity 0.2s;
  }
  .booking-form .submit-btn:hover { opacity: 0.85; }

  /* --- Input Area --- */
  .chat-input-area {
    padding: 12px 16px;
    background: #fff;
    border-top: 1px solid #eee;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .chat-input-area textarea {
    flex: 1; resize: none; border: 1.5px solid #ddd; border-radius: 20px;
    padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none;
    max-height: 80px; transition: border-color 0.2s;
  }
  .chat-input-area textarea:focus { border-color: #ff6b35; }
  .chat-send {
    background: linear-gradient(135deg, #ff6b35, #ff8c5a); border: none;
    border-radius: 50%; width: 42px; height: 42px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff; transition: opacity 0.2s; flex-shrink: 0;
  }
  .chat-send:hover { opacity: 0.85; }

  /* --- Booking ID display --- */
  .booking-id-badge {
    background: linear-gradient(135deg, #ff6b35, #feca57); color: #fff;
    border-radius: 8px; padding: 8px 14px; font-size: 18px; font-weight: bold;
    text-align: center; letter-spacing: 2px; margin: 8px 0;
  }

  /* --- Mobile Fullscreen --- */
  @media (max-width: 480px) {
    .chat-launcher { bottom: 16px; right: 16px; width: 54px; height: 54px; font-size: 24px; }
    .chat-popup {
      width: 100%; height: 100vh; bottom: 0; right: 0;
      border-radius: 0; position: fixed;
    }
  }
</style>
</head>
<body>

<!-- Floating launcher button -->
<button class="chat-launcher" id="chatLauncher" aria-label="Open chat">💬</button>

<!-- Chat popup -->
<div class="chat-popup" id="chatPopup">
  <!-- Header -->
  <div class="chat-header">
    <div>
      <div class="chat-header-title">Go Taipei Bot</div>
      <div class="chat-header-sub">ผู้ช่วยจองทัวร์</div>
    </div>
    <button class="chat-close" id="chatClose" aria-label="Close chat">✕</button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- Input -->
  <div class="chat-input-area">
    <textarea id="chatInput" placeholder="พิมพ์ข้อความ..." rows="1"></textarea>
    <button class="chat-send" id="chatSend" aria-label="Send">➤</button>
  </div>
</div>

<script>
/* ===================================
   Go Taipei Chat Widget
   Config: CHANGE THIS URL to your OpenClaw webhook
   =================================== */

// ── State ──
let currentStep = 'welcome';  // welcome | tour_selected | booking | FAQ | out_of_scope | confirm_booking
let selectedTour = '';
let bookingData = {};
let bookingCount = parseInt(sessionStorage.getItem('gt_booking_count') || '0');
let lastBotMsg = null;

// ── Config ──
const WEBHOOK_URL = 'https://YOUR-OPENCLAW-WEBHOOK-URL'; // TODO: เปลี่ยนเป็น URL จริง

// ── Tours ──
const tours = [
  { id: 'alishan',      label: '1. อะไหล่ (Alishan)',       desc: 'ป่าสน 2 วัน 1 คืน' },
  { id: 'sunmoonlake', label: '2. ซุนมูนเลค (Sun Moon Lake)', desc: 'ทะเลสาบซุนมูนเลค 1 วัน' },
  { id: 'jiufen',       label: '3. เจี๋ยวเฟิน (Jiufen)',       desc: 'เมืองเหมืองทอง 1 วัน' },
  { id: 'taipingshan', label: '4. ไท่เป้ยซาน (Taipingshan)',   desc: 'ผจเยอร์ไท่เป้ยซาน 1 วัน' },
  { id: 'citytour',    label: '5. ทัวร์ในไทเป (City Tour)',     desc: 'เที่ยวในกรุงไทเป 1 วัน' },
];

// ── FAQ ──
const faqMap = {
  '📍': 'tour_list',
  '💰': 'price',
  '🕐': 'duration',
  '🚗': 'vehicle',
  '♿': 'accessibility',
};

const faqAnswers = {
  tour_list: `🎯 ทัวร์ที่มีให้เลือก:

${tours.map(t => `• ${t.label}\n  ${t.desc}`).join('\n')}`,
  price: `💰 ราคาเริ่มต้น (รวมรถ + ไกด์):

• อะไหล่: ฿8,500/คน (ขึ้นอยู่กับจำนวนคน)
• ซุนมูนเลค: ฿4,500/คน
• เจี๋ยวเฟิน: ฿3,500/คน
• ไท่เป้ยซาน: ฿4,000/คน
• City Tour: ฿2,500/คน

📌 ราคาแยกตามประเภทรถ กดปุ่ม "เริ่มจอง" เพื่อดูรายละเอียดเพิ่มเติมค่ะ`,
  duration: `🕐 ระยะเวลาทัวร์:

• อะไหล่ (Alishan): 2 วัน 1 คืน
• ซุนมูนเลค (Sun Moon Lake): 1 วัน
• เจี๋ยวเฟิน (Jiufen): 1 วัน
• ไท่เป้ยซาน (Taipingshan): 1 วัน
• ทัวร์ในไทเป (City Tour): 1 วัน`,
  vehicle: `🚗 ประเภทรถที่มี:

• เก๋ง (Sedan): 1-3 คน
• ตู้ (Van): 4-8 คน
• มินิบัส (Minibus): 9-20 คน

📌 เลือกประเภทรถได้ในแบบฟอร์มจองค่ะ`,
  accessibility: `♿ สิทธิ์พิเศษ:

• วีลแชร์: รองรับ (ระบุในแบบฟอร์ม)
• คาร์ซีทเด็ก: รองรับ (ระบุในแบบฟอร์ม)

📌 กรุณาแจ้งล่วงหน้าตอนจองด้วยค่ะ`,
};

// ── DOM refs ──
const launcher = document.getElementById('chatLauncher');
const popup    = document.getElementById('chatPopup');
const closeBtn = document.getElementById('chatClose');
const messages = document.getElementById('chatMessages');
const input    = document.getElementById('chatInput');
const sendBtn  = document.getElementById('chatSend');

// ── Toggle popup ──
launcher.addEventListener('click', () => {
  popup.classList.toggle('open');
  launcher.classList.toggle('active');
  if (popup.classList.contains('open') && messages.children.length === 0) {
    sendWelcome();
  }
});
closeBtn.addEventListener('click', () => {
  popup.classList.remove('open');
  launcher.classList.remove('active');
});

// ── Send message ──
function sendMsg(text, cls = 'bot', extraHtml = '') {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.innerHTML = text + extraHtml;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  lastBotMsg = div;
  return div;
}

function sendBot(text, extraHtml = '') { return sendMsg(text, 'bot', extraHtml); }
function sendUser(text) { return sendMsg(text, 'user'); }

function sendQuickReplies(labels) {
  const html = '<div class="quick-replies">' +
    labels.map(l => `<button class="qr-btn" onclick="handleQR('${l}')">${l}</button>`).join('') +
    '</div>';
  return sendBot('', html);
}

// ── Welcome ──
function sendWelcome() {
  currentStep = 'welcome';
  sendBot(`สวัสดีค่ะ 👋 ยินดีต้อนรับสู่ Go Taipei!

เอด้าคือผู้ช่วยจองทัวร์ของ Go Taipei ค่ะ
ช่วยได้เฉพาะเรื่องทัวร์และการจองเที่ยวไต้หวันเท่านั้นนะคะ

🎯 คุณสนใจทัวร์ไหนคะ?`);
  sendTourOptions();
}

function sendTourOptions() {
  const html = '<div class="msg-tour-options">' +
    tours.map(t => `<button class="tour-opt" onclick="selectTour('${t.id}')">${t.label}<br><small style="color:#888">${t.desc}</small></button>`).join('') +
    '</div>';
  sendBot('', html);
}

// ── QR handler ──
function handleQR(label) {
  sendUser(label);
  if (label === '📍 มีทัวร์ไหนบ้าง') {
    currentStep = 'tour_selected';
    sendBot(faqAnswers.tour_list);
    sendQuickReplies(['💰 ราคาเท่าไหร่', '🕐 ใช้เวลากี่วัน', '🚗 มีรถกี่ที่นั่ง', '♿ มีสิทธิ์พิเศษ', '📋 เริ่มจองเลย']);
  } else if (label === '💰 ราคาเท่าไหร่') {
    sendBot(faqAnswers.price);
    sendQuickReplies(['📍 มีทัวร์ไหนบ้าง', '📋 เริ่มจองเลย']);
  } else if (label === '🕐 ใช้เวลากี่วัน') {
    sendBot(faqAnswers.duration);
    sendQuickReplies(['📍 มีทัวร์ไหนบ้าง', '📋 เริ่มจองเลย']);
  } else if (label === '🚗 มีรถกี่ที่นั่ง') {
    sendBot(faqAnswers.vehicle);
    sendQuickReplies(['📍 มีทัวร์ไหนบ้าง', '📋 เริ่มจองเลย']);
  } else if (label === '♿ มีสิทธิ์พิเศษ') {
    sendBot(faqAnswers.accessibility);
    sendQuickReplies(['📍 มีทัวร์ไหนบ้าง', '📋 เริ่มจองเลย']);
  } else if (label === '📋 เริ่มจองเลย') {
    currentStep = 'booking';
    startBooking();
  }
}

// ── Tour selection ──
function selectTour(id) {
  selectedTour = tours.find(t => t.id === id);
  sendUser(selectedTour.label);
  currentStep = 'booking';
  startBooking();
}

// ── Booking form ──
function startBooking() {
  bookingData = {};
  const tourOptions = tours.map(t => `<option value="${t.id}" ${t.id === selectedTour?.id ? 'selected' : ''}>${t.label}</option>`).join('');
  const html = `<div class="booking-form">
<label>ชื่อผู้จอง *</label>
<input type="text" id="bf-name" placeholder="ชื่อ-นามสกุล" />

<label>วันที่ต้องการเดินทาง *</label>
<input type="date" id="bf-date" />

<label>จำนวนคน *</label>
<input type="number" id="bf-pax" placeholder="1" min="1" />

<label>โปรแกรมทัวร์</label>
<select id="bf-tour">${tourOptions}</select>

<label>ประเภทรถ</label>
<div class="radio-group">
  <label><input type="radio" name="bf-vehicle" value="sedan" checked> เก๋ง (1-3 คน)</label>
  <label><input type="radio" name="bf-vehicle" value="van"> ตู้ (4-8 คน)</label>
  <label><input type="radio" name="bf-vehicle" value="minibus"> มินิบัส (9-20 คน)</label>
</div>

<label>ต้องการเพิ่มเติม</label>
<div class="checkboxes">
  <label><input type="checkbox" id="bf-wheelchair"> ♿ วีลแชร์</label>
  <label><input type="checkbox" id="bf-carseat"> 🚗 คาร์ซีท</label>
</div>

<label>ข้อความเพิ่มเติม</label>
<textarea id="bf-note" placeholder="คำถามหรือต้องการเพิ่มเติม..."></textarea>

<button class="submit-btn" onclick="submitBooking()">📋 ส่งข้อมูลจอง</button>
</div>`;
  sendBot('📋 กรุณากรอกข้อมูลด้านล่างค่ะ:', html);
}

// ── Submit booking ──
function submitBooking() {
  bookingData = {
    name:       document.getElementById('bf-name').value.trim(),
    date:       document.getElementById('bf-date').value,
    pax:        document.getElementById('bf-pax').value,
    tour:       document.getElementById('bf-tour').value,
    vehicle:    document.querySelector('input[name="bf-vehicle"]:checked')?.value || 'sedan',
    wheelchair: document.getElementById('bf-wheelchair').checked,
    carseat:    document.getElementById('bf-carseat').checked,
    note:       document.getElementById('bf-note').value.trim(),
  };

  if (!bookingData.name || !bookingData.date || !bookingData.pax) {
    sendBot('กรุณากรอกชื่อ วันที่ และจำนวนคนให้ครบค่ะ');
    return;
  }

  // Assign Booking ID
  bookingCount++;
  sessionStorage.setItem('gt_booking_count', bookingCount);
  const bookingId = 'GT' + String(bookingCount).padStart(3, '0');

  currentStep = 'confirm_booking';
  const tourName = tours.find(t => t.id === bookingData.tour)?.label || bookingData.tour;
  const vehicleLabel = { sedan: 'เก๋ง', van: 'ตู้', minibus: 'มินิบัส' }[bookingData.vehicle] || bookingData.vehicle;
  const extras = [];
  if (bookingData.wheelchair) extras.push('วีลแชร์');
  if (bookingData.carseat) extras.push('คาร์ซีท');

  sendBot(`✅ ได้รับข้อมูลแล้วค่ะ

<div class="booking-id-badge">📌 ${bookingId}</div>

สรุป:
• คุณ ${bookingData.name}
• ทัวร์: ${tourName}
• วันที่: ${bookingData.date}
• จำนวน: ${bookingData.pax} คน / รถ ${vehicleLabel}
${extras.length ? '• ต้องการ: ' + extras.join(', ') : '• ไม่มีสิ่งพิเศษ'}

ทีมงานจะติดต่อกลับภายใน 24 ชม. ค่ะ 🙏

📞 ต้องการสอบถามเพิ่มเติม? บอก Booking ID นี้ได้เลยค่ะ`);

  // TODO: POST to webhook so Ada receives the booking
  // sendToWebhook({ action: 'booking', bookingId, ...bookingData });

  sendQuickReplies(['📍 ดูทัวร์อื่น', '🔄 จองอีกรอบ']);
}

function sendToWebhook(data) {
  fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  }).catch(() => {}); // silent fail
}

// ── Free-text input ──
function handleInput(text) {
  text = text.trim();
  if (!text) return;

  sendUser(text);

  if (currentStep === 'booking') {
    // Let user type freely or use form
    sendBot('กรุณากรอกข้อมูลในแบบฟอร์มด้านบนค่ะ หรือพิมพ์ "จอง" เพื่อเริ่มจองใหม่');
    return;
  }

  if (currentStep === 'confirm_booking') {
    if (text.includes('จอง') || text.includes('เริ่ม')) {
      currentStep = 'welcome';
      sendWelcome();
    } else {
      sendBot('มีอะไรสอบถามเพิ่มเติมได้เลยค่ะ 😊');
      sendQuickReplies(['📍 มีทัวร์ไหนบ้าง', '📋 เริ่มจองเลย']);
    }
    return;
  }

  // Fallback: simple keyword matching
  const lower = text.toLowerCase();
  if (lower.includes('ราคา') || lower.includes('ค่าใช้จ่าย') || lower.includes('เท่าไหร่')) {
    sendBot(faqAnswers.price);
  } else if (lower.includes('เวลา') || lower.includes('กี่วัน') || lower.includes('ระยะ')) {
    sendBot(faqAnswers.duration);
  } else if (lower.includes('รถ') || lower.includes('ที่นั่ง')) {
    sendBot(faqAnswers.vehicle);
  } else if (lower.includes('วีล') || lower.includes('คาร์') || lower.includes('เด็ก')) {
    sendBot(faqAnswers.accessibility);
  } else if (lower.includes('จอง') || lower.includes('เริ่ม') || lower.includes('จองทัวร์')) {
    currentStep = 'welcome';
    sendWelcome();
  } else if (lower.includes('ขอบคุณ') || lower.includes('thank')) {
    sendBot('ยินดีค่ะ 😊 มีอะไรสอบถามเพิ่มเติมได้เลยค่ะ');
  } else {
    // Out of scope → escalate
    currentStep = 'out_of_scope';
    sendBot(`ขออภัยค่ะ เอด้าเป็นผู้ช่วยจองทัวร์โดยเฉพาะ
ช่วยได้เฉพาะเรื่อง:
• ข้อมูลทัวร์และราคา
• การจองรถเช่า / ไกด์
• คำถามทั่วไปเกี่ยวกับการเที่ยวไต้หวัน

สำหรับเรื่องอื่น ติดต่อได้ที่ LINE: @gotaipei ค่ะ`);
