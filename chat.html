<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Taipei Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; }
.chat-launcher { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #ff6b35, #feca57); border: none; cursor: pointer; box-shadow: 0 4px 20px #ff6b3555; z-index: 99998; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: transform 0.2s, box-shadow 0.2s; }
.chat-launcher:hover { transform: scale(1.1); box-shadow: 0 6px 25px #ff6b3588; }
.chat-launcher.active { transform: rotate(45deg); }
.chat-popup { position: fixed; bottom: 96px; right: 24px; width: 360px; height: 520px; background: #fff; border-radius: 16px; box-shadow: 0 8px 40px #0003; z-index: 99999; display: none; flex-direction: column; overflow: hidden; }
.chat-popup.open { display: flex; }
.chat-header { background: linear-gradient(135deg, #1a5276, #2e86ab); color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.chat-header-title { font-size: 16px; font-weight: bold; }
.chat-header-sub { font-size: 12px; opacity: 0.8; }
.chat-close { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 0; line-height: 1; opacity: 0.8; }
.chat-close:hover { opacity: 1; }
.chat-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.chat-body::-webkit-scrollbar { width: 6px; }
.chat-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
.form-area { padding: 20px; background: #f0f2f5; flex: 1; }
.form-title { font-size: 15px; font-weight: bold; color: #1a5276; margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 500; }
.form-group input, .form-group select { width: 100%; padding: 9px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; color: #333; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
.form-group input:focus, .form-group select:focus { border-color: #ff6b35; }
.form-group select { cursor: pointer; }
.radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
.radio-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px; color: #333; }
.radio-group input[type="radio"] { width: auto; cursor: pointer; }
.submit-btn { width: 100%; background: linear-gradient(135deg, #ff6b35, #ff8c5a); color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 8px; }
.submit-btn:hover { opacity: 0.9; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.success-area { display: none; padding: 20px; background: #f0f2f5; flex: 1; }
.success-area.show { display: block; }
.success-badge { background: #fff; border: 1.5px solid #27ae60; border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 16px; }
.success-badge .icon { font-size: 40px; margin-bottom: 8px; }
.success-badge .title { font-size: 16px; font-weight: bold; color: #27ae60; margin-bottom: 6px; }
.success-badge .subtitle { font-size: 13px; color: #666; line-height: 1.5; }
.booking-id-display { background: linear-gradient(135deg, #ff6b35, #feca57); color: #fff; border-radius: 10px; padding: 14px; text-align: center; font-size: 18px; font-weight: bold; letter-spacing: 3px; margin-bottom: 16px; }
.booking-ref { font-size: 13px; color: #666; margin-bottom: 6px; }
.chat-area { flex: 1; display: flex; flex-direction: column; padding: 16px; background: #fff; }
.chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 10px; }
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
.msg { max-width: 82%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
.msg.bot { background: #f0f2f5; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.user { background: linear-gradient(135deg, #ff6b35, #ff8c5a); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.system { background: #fff3ee; color: #856404; align-self: center; border-radius: 10px; font-size: 12px; text-align: center; border: 1px solid #ffc107; }
.quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.qr-btn { background: #fff; border: 1.5px solid #2e86ab; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #2e86ab; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.qr-btn:hover { background: #2e86ab; color: #fff; }
.fallback-badge { background: #fff3cd; border: 1.5px solid #ffc107; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #856404; margin-top: 8px; line-height: 1.7; }
.chat-input-area { display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid #eee; flex-shrink: 0; }
.chat-input-area textarea { flex: 1; resize: none; border: 1.5px solid #ddd; border-radius: 20px; padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; max-height: 80px; transition: border-color 0.2s; box-sizing: border-box; }
.chat-input-area textarea:focus { border-color: #ff6b35; }
.chat-send { background: linear-gradient(135deg, #ff6b35, #ff8c5a); border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; flex-shrink: 0; align-self: flex-end; }
@media (max-width: 480px) {
  .chat-launcher { bottom: 16px; right: 16px; width: 54px; height: 54px; font-size: 24px; }
  .chat-popup { width: 100%; height: 100vh; bottom: 0; right: 0; border-radius: 0; }
}
</style>
</head>
<body>
<button class="chat-launcher" id="chatLauncher">&#x1F4AC;</button>
<div class="chat-popup" id="chatPopup">
  <div class="chat-header">
    <div><div class="chat-header-title">Go Taipei</div><div class="chat-header-sub">จองทัวร์ เช่ารถ</div></div>
    <button class="chat-close" id="chatClose">&#x2715;</button>
  </div>
  <div class="chat-body">
    <div class="form-area" id="formArea">
      <div class="form-title">📋 กรอกข้อมูลการจองทัวร์</div>
      <div class="form-group">
        <label>ชื่อ-นามสกุล *</label>
        <input type="text" id="f-name" placeholder="เช่น สมชาย ใจดี" />
      </div>
      <div class="form-group">
        <label>วันที่ต้องการเดินทาง *</label>
        <input type="date" id="f-date" />
      </div>
      <div class="form-group">
        <label>จำนวนผู้โดยสาร *</label>
        <input type="number" id="f-pax" placeholder="1" min="1" />
      </div>
      <div class="form-group">
        <label>โปรแกรมทัวร์</label>
        <select id="f-tour">
          <option value="jiufen-yehliu">1. จิ่วเฟิ่น, ท่าเรือเจิ้งปิน, เยว่หลิว, สือเฟิ่น</option>
          <option value="sunmoonlake">2. ซันมูนเลค (Sun Moon Lake)</option>
          <option value="citytour">3. ทัวร์ในไทเป (Taipei City Tour)</option>
          <option value="yangmingshan">4. หยางหมิงซาน, เป่ยโถว, ตั้นสุ่ย</option>
          <option value="alishan">5. อุทยานอาลีซาน (Alishan) 2 วัน 1 คืน</option>
          <option value="carrental">6. เช่ารถเที่ยวค้างคืนนอกไทเป</option>
          <option value="custom">7. ทัวร์ออกแบบเอง (แจ้งรายละเอียดเพิ่มเติม)</option>
        </select>
      </div>
      <div class="form-group">
        <label>ประเภทรถ</label>
        <div class="radio-group">
          <label><input type="radio" name="f-vehicle" value="sedan" checked> เก๋ง (1-4 คน)</label>
          <label><input type="radio" name="f-vehicle" value="van"> ตู้ (5-8 คน)</label>
        </div>
      </div>
      <div class="form-group">
        <label>หมายเหตุ / รายละเอียดเพิ่มเติม</label>
        <input type="text" id="f-note" placeholder="เช่น ต้องการทัวร์ส่วนตัว, มีเด็กเล็ก, ต้องการเปลี่ยนแปลงรายการ" />
      </div>
      <button class="submit-btn" id="f-submit" onclick="submitForm()">ส่งข้อมูลจอง</button>
    </div>
    <div class="success-area" id="successArea">
      <div class="booking-id-display" id="bookingIdDisplay">รอสักครู่...</div>
      <div class="success-badge">
        <div class="icon">✅</div>
        <div class="title">รับข้อมูลแล้วค่ะ</div>
        <div class="subtitle" id="successSubtitle">ทาง LINE จะติดต่อกลับภายใน 30 นาที<br>หากไม่ได้รับการติดต่อ กรุณาติดต่อเราทาง LINE @966kmony</div>
      </div>
      <div style="font-size:13px; color:#666; margin-bottom:10px;">💬 ถามเพิ่มเติมได้ที่นี่ค่ะ:</div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <textarea id="chatInput" placeholder="พิมพ์คำถาม..." rows="1"></textarea>
        <button class="chat-send" id="chatSend">&#x25B6;</button>
      </div>
    </div>
  </div>
</div>
<script>
(function() {
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbyEKH8Q9yZHeN4A9_baQ9-LBntybZaQ8vIDvXotW3qFwtFyWlo8j0m-yGY0zf74RIOO8A/exec';

  var isSubmitting = false;
  var popupOpen = false;
  var bookingSubmitted = false;
  var currentBookingId = '';
  var pendingQuestion = null;

  var tours = {
    'jiufen-yehliu': 'จิ่วเฟิ่น, ท่าเรือเจิ้งปิน, เยว่หลิว, สือเฟิ่น',
    'sunmoonlake': 'ซันมูนเลค (Sun Moon Lake)',
    'citytour': 'ทัวร์ในไทเป (Taipei City Tour)',
    'yangmingshan': 'หยางหมิงซาน, เป่ยโถว, ตั้นสุ่ย',
    'alishan': 'อุทยานอาลีซาน (Alishan) 2 วัน 1 คืน',
    'carrental': 'เช่ารถเที่ยวค้างคืนนอกไทเป',
    'custom': 'ทัวร์ออกแบบเอง'
  };

  var launcher = document.getElementById('chatLauncher');
  var popup = document.getElementById('chatPopup');
  var closeBtn = document.getElementById('chatClose');
  var formArea = document.getElementById('formArea');
  var successArea = document.getElementById('successArea');
  var messages = document.getElementById('chatMessages');
  var input = document.getElementById('chatInput');
  var sendBtn = document.getElementById('chatSend');

  launcher.addEventListener('click', function() {
    popupOpen = !popupOpen;
    popup.classList.toggle('open', popupOpen);
  });
  closeBtn.addEventListener('click', function() {
    popupOpen = false;
    popup.classList.remove('open');
    launcher.classList.remove('active');
  });

  function addMsg(text, cls) {
    cls = cls || 'bot';
    var div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function addQuickReplies(labels) {
    var html = '<div class="quick-replies">' +
      labels.map(function(l) {
        return '<button class="qr-btn" onclick="handleQR(\'' + l.replace(/'/g, "\\'") + '\')">' + l + '</button>';
      }).join('') + '</div>';
    var div = document.createElement('div');
    div.innerHTML = html;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showFallback() {
    var div = document.createElement('div');
    div.className = 'fallback-badge';
    div.innerHTML = '⚠️ ไม่สามารถส่งข้อมูลได้ในขณะนี้<br>กรุณาติดต่อทาง LINE: @966kmony หรือ โทร +886 96-881-7739 ค่ะ';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function sendToBackend(text, onSuccess, onFallback) {
    var controller = new AbortController();
    var timer = setTimeout(function() { controller.abort(); }, 10000);
    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text }),
      signal: controller.signal,
    }).then(function(r) {
      clearTimeout(timer);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      if (onSuccess) onSuccess();
    }).catch(function(err) {
      clearTimeout(timer);
      if (onFallback) onFallback();
    });
  }

  function generateBookingId() {
    var stored = sessionStorage.getItem('gt_booking_count');
    var count = stored ? parseInt(stored) : 0;
    count++;
    sessionStorage.setItem('gt_booking_count', count);
    return 'GT' + String(count).padStart(3, '0');
  }

  window.submitForm = function() {
    if (isSubmitting) return;

    var name = document.getElementById('f-name').value.trim();
    var date = document.getElementById('f-date').value;
    var pax = document.getElementById('f-pax').value;
    var tourId = document.getElementById('f-tour').value;
    var vehicle = (document.querySelector('input[name="f-vehicle"]:checked') || {value:'sedan'}).value;
    var note = document.getElementById('f-note').value.trim();

    if (!name || !date || !pax) {
      alert('กรุณากรอกชื่อ วันที่ และจำนวนให้ครบถ้วนค่ะ');
      return;
    }

    var btn = document.getElementById('f-submit');
    btn.disabled = true;
    btn.textContent = 'กำลังส่ง...';
    isSubmitting = true;

    currentBookingId = generateBookingId();
    var tourName = tours[tourId] || tourId;
    var vehicleLabel = vehicle === 'van' ? 'ตู้ (5-8 คน)' : 'เก๋ง (1-4 คน)';

    // Format date for display
    var dateParts = date.split('-');
    var displayDate = dateParts[2] + '/' + dateParts[1] + '/' + dateParts[0];

    var telegramText = '📋 [จองทัวร์จากเว็บ]\n\n' +
      '📌 Booking ID: ' + currentBookingId + '\n' +
      '• ชื่อ: ' + name + '\n' +
      '• วันที่: ' + displayDate + '\n' +
      '• จน.: ' + pax + ' คน\n' +
      '• ทัวร์: ' + tourName + '\n' +
      '• รถ: ' + vehicleLabel +
      (note ? '\n• หมายเหตุ: ' + note : '');

    sendToBackend(telegramText,
      function() {
        // Show success
        document.getElementById('bookingIdDisplay').textContent = currentBookingId;
        document.getElementById('successSubtitle').innerHTML = 'ทาง LINE จะติดต่อกลับภายใน 30 นาที<br>หากไม่ได้รับการติดต่อ กรุณาติดต่อเราทาง LINE @966kmony ค่ะ';
        formArea.style.display = 'none';
        successArea.classList.add('show');
        bookingSubmitted = true;

        // Add welcome message in chat
        addMsg('สวัสดีค่ะ ' + name + ' ขอบคุณที่สนใจบริการค่ะ 💬\n\nหากมีคำถามเพิ่มเติม สามารถพิมพ์ได้เลยค่ะ', 'bot');
        addQuickReplies(['ราคาทัวร์', 'ติดต่อ LINE', 'ยกเลิกการจอง']);

        isSubmitting = false;
        btn.disabled = false;
        btn.textContent = 'ส่งข้อมูลจอง';
      },
      function() {
        // Fallback
        document.getElementById('bookingIdDisplay').textContent = currentBookingId;
        document.getElementById('successSubtitle').innerHTML = '⚠️ ระบบขัดข้อง กรุณาติดต่อทาง LINE @966kmony หรือ โทร +886 96-881-7739 ค่ะ';
        formArea.style.display = 'none';
        successArea.classList.add('show');
        bookingSubmitted = true;

        addMsg('ข้อมูลถูกบันทึกแล้วค่ะ แต่การส่งไปยังระบบล่าช้า กรุณาติดต่อทาง LINE @966kmony ด้วยตนเองด้วยนะคะ', 'system');

        isSubmitting = false;
        btn.disabled = false;
        btn.textContent = 'ส่งข้อมูลจอง';
      }
    );
  };

  window.handleQR = function(label) {
    addMsg(label, 'user');
    if (label.indexOf('ราคา') !== -1) {
      addMsg('ราคาทัวร์ (ราคาต่อคัน รวมน้ำมัน ทางด่วน คนขับ):\n\n' +
        '• จิ่วเฟิ่น: 4,500-5,000 บาท\n' +
        '• ซันมูนเลค: 7,000-9,000 บาท\n' +
        '• ทัวร์ในไทเป: 4,500-5,000 บาท\n' +
        '• หยางหมิงซาน: 7,000-8,500 บาท\n' +
        '• อลีซาน: 7,000-8,500 บาท/วัน\n\n' +
        'ราคาข้างต้นเป็นราคาประมาณ สำหรับรถเก๋ง (4 ท่าน) ค่ะ', 'bot');
      addQuickReplies(['ติดต่อ LINE', 'ถามเพิ่มเติม']);
    } else if (label.indexOf('LINE') !== -1 || label.indexOf('ติดต่อ') !== -1) {
      addMsg('📱 ติดต่อเราได้ทาง:\n\nLINE: @966kmony\nWhatsApp: 087-519-8224\nโทร: +886 96-881-7739\nFacebook: Go Taipei\n\nหรือพิมพ์คำถามมาได้เลยค่ะ', 'bot');
      addQuickReplies(['ราคาทัวร์', 'ถามเพิ่มเติม']);
    } else if (label.indexOf('ยกเลิก') !== -1) {
      addMsg('การจอง ' + currentBookingId + ' ยังไม่ถูกยืนยันค่ะ\n\nหากต้องการยกเลิก กรุณาติดต่อทาง LINE @966kmony หรือโทร +886 96-881-7739 ค่ะ', 'bot');
    } else {
      addMsg('ขอบคุณค่ะ หากมีอะไรเพิ่มเติมจะแจ้งให้ทราบทาง LINE ค่ะ 💬', 'bot');
    }
  };

  function handleChatInput(text) {
    text = text.trim();
    if (!text) return;
    addMsg(text, 'user');

    // Send question to Telegram
    var telegramText = '💬 [คำถามจากเว็บ - ' + currentBookingId + ']\n\n' +
      'ลูกค้าถาม:\n"' + text + '"';

    sendToBackend(telegramText,
      function() {
        addMsg('📨 ส่งคำถามไปยังระบบแล้วค่ะ ทาง LINE จะติดต่อกลับภายใน 30 นาทีค่ะ 💬', 'bot');
      },
      function() {
        addMsg('⚠️ ไม่สามารถส่งคำถามได้ในขณะนี้ กรุณาติดต่อทาง LINE @966kmony ค่ะ', 'system');
      }
    );
  }

  sendBtn.addEventListener('click', function() {
    handleChatInput(input.value);
    input.value = '';
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleChatInput(input.value);
      input.value = '';
    }
  });
  input.addEventListener('input', function() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 80) + 'px';
  });
})();
</script>
</body>
</html>
