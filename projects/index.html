<title>📂 Projects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    background: #1a1a1a;
    border-radius: 12px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: #e0e0e0;
    border: 1px solid #2a2a2a;
  }
  .item:hover {
    background: #222;
    border-color: #444;
    transform: translateX(4px);
  }
  .item-icon { font-size: 28px; }
  .item-info { flex: 1; }
  .item-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .item-desc { color: #666; font-size: 13px; }
  .item-arrow { color: #444; font-size: 18px; }
  .item:hover .item-arrow { color: #888; }
</style>
</head>
