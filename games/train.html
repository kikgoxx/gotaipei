<script>
// ΓöÇΓöÇΓöÇ AUDIO ENGINE ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
let audioCtx = null;
let muted = false;
let bgmGain, bgmOsc;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = 0.12;
  bgmGain.connect(audioCtx.destination);
}

function playSFX(type) {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);

  if (type === 'eat') {
    const osc = audioCtx.createOscillator();
    osc.connect(g);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520, now);
    osc.frequency.exponentialRampToValueAtTime(780, now + 0.08);
    g.gain.setValueAtTime(0.3, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.start(now);
    osc.stop(now + 0.12);
  } else if (type === 'powerup') {
    const osc = audioCtx.createOscillator();
    osc.connect(g);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(900, now + 0.2);
    g.gain.setValueAtTime(0.25, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.start(now);
    osc.stop(now + 0.3);
  } else if (type === 'die') {
    const osc = audioCtx.createOscillator();
    osc.connect(g);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.4);
    g.gain.setValueAtTime(0.3, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.start(now);
    osc.stop(now + 0.5);
  } else if (type === 'levelup') {
    [0, 0.1, 0.2].forEach((offset, i) => {
      const osc = audioCtx.createOscillator();
      osc.connect(g);
      osc.type = 'sine';
      osc.frequency.setValueAtTime([523, 659, 784][i], now + offset);
      g.gain.setValueAtTime(0.2, now + offset);
      g.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.15);
      osc.start(now + offset);
      osc.stop(now + offset + 0.15);
    });
  }
}

let bgmPlaying = false;
function startBGM() {
  if (!audioCtx || muted || bgmPlaying) return;
  bgmPlaying = true;
  const notes = [262, 294, 330, 349, 392, 349, 330, 294];
  let noteIdx = 0;
  function playNote() {
    if (!bgmPlaying || muted) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = notes[noteIdx % notes.length];
    osc.connect(g);
    g.connect(bgmGain);
    g.gain.setValueAtTime(0.4, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
    osc.start(now);
    osc.stop(now + 0.45);
    noteIdx++;
    setTimeout(playNote, 500);
  }
  playNote();
}

function stopBGM() {
  bgmPlaying = false;
}

// ΓöÇΓöÇΓöÇ THEMES ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
const THEMES = {
  classic:  { bg: '#1e3a5f', grid: 'rgba(255,255,255,0.05)', accent: '#ff6b35', food: '#feca57', powerup: '#a29bfe', particle: ['#ff6b35','#feca57','#ff2e63'] },
  ocean:    { bg: '#0a1628', grid: 'rgba(52,152,219,0.08)', accent: '#3498db', food: '#74b9ff', powerup: '#00cec9', particle: ['#3498db','#74b9ff','#00cec9'] },
  space:    { bg: '#0a0a1a', grid: 'rgba(180,180,255,0.06)', accent: '#a29bfe', food: '#fd79a8', powerup: '#feca57', particle: ['#a29bfe','#fd79a8','#feca57'] },
  forest:   { bg: '#0d2818', grid: 'rgba(85,238,108,0.07)', accent: '#00b894', food: '#55efc4', powerup: '#fdcb6e', particle: ['#00b894','#55efc4','#fdcb6e'] },
  volcano:  { bg: '#1a0a0a', grid: 'rgba(255,100,50,0.07)', accent: '#d63031', food: '#feca57', powerup: '#e17055', particle: ['#d63031','#ff7675','#feca57'] }
};
let currentTheme = 'classic';

// ΓöÇΓöÇΓöÇ GAME STATE ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('msg');
const startBtn = document.getElementById('startBtn');
const modeTag = document.getElementById('mode-tag');
const levelEl = document.getElementById('level');
const powerupDisplay = document.getElementById('powerupDisplay');
const challengeBar = document.getElementById('challengeBar');
const timerFill = document.getElementById('timerFill');
const livesDisplay = document.getElementById('livesDisplay');

const GRID = 22;
const COLS = Math.floor(canvas.width / GRID);
const ROWS = Math.floor(canvas.height / GRID);
const OFFSET_X = (canvas.width - COLS * GRID) / 2;
const OFFSET_Y = (canvas.height - ROWS * GRID) / 2;

// ΓöÇΓöÇΓöÇ MODES ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
let gameMode = 'challenge'; // classic | challenge | timeAttack
let challengeLevel = 1;
let lives = 3;
let timeLeft = 0; // for timeAttack
let timeMax = 120; // 2 α╕Öα╕▓α╕ùα╕╡
let timerInterval = null;

const CLASSIC_LEVELS = [0, 5, 10, 15, 20, 30, 40, 55, 70, 90]; // score thresholds

// ΓöÇΓöÇΓöÇ LEADERBOARD ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
const LB_KEY = 'trainLB';
function getLB() {
  try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]'); } catch { return []; }
}
function saveLB(mode, score, name) {
  const lb = getLB();
  lb.push({ score, mode, name: name || 'Anonymous', ts: Date.now() });
  lb.sort((a, b) => b.score - a.score);
  lb.splice(20); // keep top 20
  localStorage.setItem(LB_KEY, JSON.stringify(lb));
}
function showLB(modeFilter) {
  const lb = getLB().filter(e => !modeFilter || e.mode === modeFilter);
  const tbody = document.querySelector('#lbTable tbody');
  tbody.innerHTML = '';
  if (lb.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#666;padding:20px;">α╕óα╕▒α╕çα╣äα╕íα╣êα╕íα╕╡α╕äα╕░α╣üα╕Öα╕Ö</td></tr>';
  } else {
    lb.slice(0, 10).forEach((e, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="rank">${i === 0 ? '≡ƒÑç' : i === 1 ? '≡ƒÑê' : i === 2 ? '≡ƒÑë' : (i+1)}</td>
        <td style="color:#fff;font-size:13px;">${e.name || 'Anonymous'}</td>
        <td><span class="mode-tag" style="background:${e.mode==='timeAttack'?'#d63031':e.mode==='challenge'?'#6c5ce7':'#0984e3'};color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;">${e.mode==='timeAttack'?'ΓÅ▒':e.mode==='challenge'?'≡ƒÅå':'≡ƒÉì'}</span></td>
        <td class="score">${e.score}</td>`;
      tbody.appendChild(tr);
    });
  }
  document.getElementById('lbOverlay').style.display = 'block';
  document.getElementById('lbPanel').style.display = 'block';
}
document.getElementById('lbBtn').addEventListener('click', () => showLB());
document.getElementById('lbClose').addEventListener('click', () => {
  document.getElementById('lbOverlay').style.display = 'none';
  document.getElementById('lbPanel').style.display = 'none';
});
document.getElementById('lbOverlay').addEventListener('click', () => {
  document.getElementById('lbOverlay').style.display = 'none';
  document.getElementById('lbPanel').style.display = 'none';
});

document.getElementById('muteBtn').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '≡ƒöç Muted' : '≡ƒöè Sound';
  document.getElementById('muteBtn').style.background = muted ? '#e17055' : '#555';
  if (muted) stopBGM(); else startBGM();
});

// ΓöÇΓöÇΓöÇ GAME VARIABLES ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
let snake, dir, food, score, gameOver, interval, tickSpeed, particles;
let powerups, activePowerups;
let enemies; // for challenge mode
let stars;  // for animated background

function init() {
  snake = [
    {x:15,y:10},{x:14,y:10},{x:13,y:10},{x:12,y:10},{x:11,y:10},{x:10,y:10}
  ];
  dir = {x:1,y:0};
  score = 0;
  gameOver = false;
  tickSpeed = 400;
  particles = [];
  powerups = [];
  activePowerups = {};
  enemies = [];
  stars = [];
  msgEl.textContent = '';
  scoreEl.textContent = '0';
  powerupDisplay.innerHTML = '';
  levelEl.textContent = challengeLevel;
  placeFood();
  if (gameMode === 'challenge') {
    lives = 3;
    livesDisplay.textContent = 'Γ¥ñ∩╕Å'.repeat(lives);
    challengeBar.style.display = 'flex';
    spawnEnemies();
  } else if (gameMode === 'timeAttack') {
    timeLeft = timeMax;
    challengeBar.style.display = 'flex';
    timerFill.style.width = '100%';
    timerFill.style.background = 'linear-gradient(90deg, #feca57, #ff6b35)';
    startTimer();
  } else {
    challengeBar.style.display = 'none';
  }
  placeFood();
  // Init stars
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 0.5 + Math.random() * 2,
      speed: 0.2 + Math.random() * 0.8,
      alpha: 0.3 + Math.random() * 0.7
    });
  }
}

function spawnEnemies() {
  enemies = [];
  const count = Math.min(1 + Math.floor(challengeLevel / 4), 2); // 1-2 enemies max
  for (let i = 0; i < count; i++) {
    placeEnemy();
  }
}

function placeEnemy() {
  let ex, ey;
  let attempts = 0;
  do {
    ex = Math.floor(Math.random() * COLS);
    ey = Math.floor(Math.random() * ROWS);
    attempts++;
  } while (
    (snake.some(s => s.x === ex && s.y === ey) || (ex === food.x && ey === food.y)) &&
    attempts < 100
  );
  if (attempts < 100) {
    enemies.push({ x: ex, y: ey });
  }
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    const pct = Math.max(0, (timeLeft / timeMax) * 100);
    timerFill.style.width = pct + '%';
    if (pct < 30) timerFill.style.background = 'linear-gradient(90deg, #d63031, #ff7675)';
    else if (pct < 60) timerFill.style.background = 'linear-gradient(90deg, #feca57, #ff6b35)';
    else timerFill.style.background = 'linear-gradient(90deg, #feca57, #ff6b35)';
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 100);
}

function placeFood() {
  do {
    food = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === food.x && s.y === food.y) ||
    enemies.some(e => e.x === food.x && e.y === food.y));
}

function spawnPowerup() {
  if (powerups.length >= 1 || Math.random() > 0.15) return;
  const types = ['slow', 'shrink', 'invincible', 'timebonus'];
  const type = types[Math.floor(Math.random() * types.length)];
  let px, py, attempts = 0;
  do {
    px = Math.floor(Math.random() * COLS);
    py = Math.floor(Math.random() * ROWS);
    attempts++;
  } while (
    (snake.some(s => s.x === px && s.y === py) || (px === food.x && py === food.y)) &&
    attempts < 50
  );
  if (attempts < 50) {
    powerups.push({ x: px, y: py, type, life: 400 });
  }
}

function activatePowerup(type) {
  playSFX('powerup');
  if (type === 'timebonus') {
    timeLeft = Math.min(timeLeft + 15, timeMax);
    playSFX('levelup');
    addParticles(snake[0].x, snake[0].y, '#00cec9');
    return;
  }
  clearTimeout(activePowerups[type + '_timer']);
  activePowerups[type] = true;
  renderPowerupBadges();
  activePowerups[type + '_timer'] = setTimeout(() => {
    activePowerups[type] = false;
    renderPowerupBadges();
  }, 8000);
  if (type === 'slow') tickSpeed = Math.min(tickSpeed + 120, 500);
  if (type === 'shrink') {
    if (snake.length > 4) snake.splice(-3, 3);
  }
}

function addParticles(x, y, color) {
  const theme = THEMES[currentTheme];
  const colors = theme.particle;
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: x * GRID + GRID/2,
      y: y * GRID + GRID/2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 3 + Math.random() * 4
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    p.size *= 0.95;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// Stars / animated background
function updateStars() {
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
    s.alpha = 0.3 + Math.sin(Date.now() * 0.002 + s.x) * 0.3;
  });
}

function drawStars() {
  const theme = THEMES[currentTheme];
  stars.forEach(s => {
    ctx.globalAlpha = s.alpha * 0.6;
    ctx.fillStyle = theme.accent;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// Theme-aware color helpers
function locoColor() { return THEMES[currentTheme].accent; }
function locoColor2() {
  const map = { classic: '#d63031', ocean: '#0066b2', space: '#6c5ce7', forest: '#009688', volcano: '#c0392b' };
  return map[currentTheme];
}
function foodColor() { return THEMES[currentTheme].food; }
function bgColor() { return THEMES[currentTheme].bg; }
function gridColor() { return THEMES[currentTheme].grid; }

// Draw locomotive (head)
function drawLocomotive(x, y) {
  const px = OFFSET_X + x * GRID;
  const py = OFFSET_Y + y * GRID;
  const g = GRID;

  // Glow when invincible
  if (activePowerups.invincible) {
    ctx.shadowColor = '#feca57';
    ctx.shadowBlur = 15;
  }

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px + 3, py + g + 1, g - 4, 5);

  const bodyGrad = ctx.createLinearGradient(px, py, px + g, py + g);
  bodyGrad.addColorStop(0, locoColor());
  bodyGrad.addColorStop(1, locoColor2());
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(px + 2, py + 2, g - 4, g - 4, 4);
  ctx.fill();

  ctx.fillStyle = '#feca57';
  ctx.fillRect(px + 2, py + g - 6, g - 4, 3);

  ctx.fillStyle = '#74b9ff';
  ctx.beginPath();
  ctx.roundRect(px + 4, py + 4, 6, 5, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(px + 12, py + 4, 6, 5, 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(px + g - 6, py + g/2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffeaa7';
  ctx.beginPath();
  ctx.arc(px + g - 6, py + g/2, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#2d3436';
  ctx.fillRect(px + 5, py - 3, 5, 5);
  ctx.fillStyle = '#636e72';
  ctx.beginPath();
  ctx.arc(px + 7.5, py - 3, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#2d3436';
  ctx.beginPath();
  ctx.arc(px + 6, py + g - 5, 3.5, 0, Math.PI * 2);
  ctx.arc(px + g - 6, py + g - 5, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#636e72';
  ctx.beginPath();
  ctx.arc(px + 6, py + g - 5, 2, 0, Math.PI * 2);
  ctx.arc(px + g - 6, py + g - 5, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
}

// Draw carriage car
function drawCar(x, y, i) {
  const px = OFFSET_X + x * GRID;
  const py = OFFSET_Y + y * GRID;
  const g = GRID;

  const carColors = [
    [THEMES[currentTheme].accent, THEMES[currentTheme].food],
    ['#6c5ce7', '#a29bfe'],
    ['#00b894', '#55efc4'],
    ['#e17055', '#fab1a0'],
    ['#d63031', '#ff7675']
  ];

    ctx.shadowBlur = 10;
  }

  ctx.fillRect(px + 2, py + g + 1, g - 4, 4);

  if (i > 1) {
    ctx.fillStyle = '#636e72';
    ctx.fillRect(px - 4, py + 6, 6, 8);
  }

  const bodyGrad = ctx.createLinearGradient(px, py, px + g, py + g);
  bodyGrad.addColorStop(0, c[0]);
  bodyGrad.addColorStop(1, c[1]);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(px + 2, py + 2, g - 4, g - 4, 3);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(px + 3, py + g/2 - 1, g - 6, 2);

  ctx.fillStyle = '#dfe6e9';
  ctx.beginPath();
  ctx.roundRect(px + 4, py + 4, 5, 5, 1);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(px + 11, py + 4, 5, 5, 1);
  ctx.fill();

  ctx.fillStyle = '#2d3436';
  ctx.beginPath();
  ctx.arc(px + 5, py + g - 5, 3, 0, Math.PI * 2);
  ctx.arc(px + g - 5, py + g - 5, 3, 0, Math.PI * 2);

// Draw tail

// Draw coin food
function drawFood() {
  const px = OFFSET_X + food.x * GRID + GRID/2;
  const py = OFFSET_Y + food.y * GRID + GRID/2;
  const g = GRID;
  const fc = foodColor();

  const glow = ctx.createRadialGradient(px, py, 0, px, py, g);

  glow.addColorStop(1, fc + '00');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(px, py, g, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = fc;
  ctx.beginPath();
  ctx.arc(px, py, g/2 - 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(px - 2, py - 2, 2, 0, Math.PI * 2);

// Draw power-up items
function drawPowerups() {
  const now = Date.now();
  powerups = powerups.filter(p => p.life > 0);
  powerups.forEach(p => {
    const px = OFFSET_X + p.x * GRID + GRID/2;
    const py = OFFSET_Y + p.y * GRID + GRID/2;
    const g = GRID;
    const fc = THEMES[currentTheme].powerup;
    const pulse = 0.8 + 0.2 * Math.sin(now * 0.008);

    const glow = ctx.createRadialGradient(px, py, 0, px, py, g * 0.8);
    glow.addColorStop(0, fc + 'aa');
    glow.addColorStop(1, fc + '00');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(px, py, g * 0.8 * pulse, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = fc;
    ctx.beginPath();
    ctx.arc(px, py, (g/2 - 3) * pulse, 0, Math.PI * 2);
    ctx.fill();

    // Icon
    const icons = { slow: '≡ƒÉî', shrink: '≡ƒö¼', invincible: 'Γ¡É', timebonus: 'ΓÅ▒' };
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(icons[p.type], px, py);

    p.life--;
  });
}

// Draw enemies (challenge mode)
function drawEnemies() {
  enemies.forEach(e => {
    const px = OFFSET_X + e.x * GRID + GRID/2;
    const py = OFFSET_Y + e.y * GRID + GRID/2;
    const g = GRID;
    const t = Date.now() * 0.003;
    const wobble = Math.sin(t + e.x + e.y) * 2;

    ctx.fillStyle = '#d63031';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(px + wobble, py, g/2 - 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('≡ƒÆÇ', px + wobble, py);
  });
}

// Draw background grid
function drawBackground() {
  ctx.fillStyle = bgColor();
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStars();

  ctx.strokeStyle = gridColor();
  ctx.lineWidth = 1;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(OFFSET_X + x * GRID, OFFSET_Y);
    ctx.lineTo(OFFSET_X + x * GRID, OFFSET_Y + ROWS * GRID);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(OFFSET_X, OFFSET_Y + y * GRID);
    ctx.lineTo(OFFSET_X + COLS * GRID, OFFSET_Y + y * GRID);
    ctx.stroke();
  }
}

function draw() {
  drawBackground();
  drawFood();
  drawPowerups();
  if (gameMode === 'challenge') drawEnemies();
  drawParticles();

  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    if (i === 0) {
      drawLocomotive(s.x, s.y);
    } else if (i === snake.length - 1) {
      drawTail(s.x, s.y);
    } else {
      drawCar(s.x, s.y, i);
    }
  }
}

// Enemy AI movement (challenge mode)
function moveEnemies() {
  enemies.forEach(e => {
    // Random direction, move every 2 ticks to slow down
    if (!e.moveCounter) e.moveCounter = 0;
    e.moveCounter++;
    if (e.moveCounter < 2) return;
    e.moveCounter = 0;

    const dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
    const chosen = dirs[Math.floor(Math.random() * dirs.length)];
    e.x = Math.max(0, Math.min(COLS - 1, e.x + chosen.x));
    e.y = Math.max(0, Math.min(ROWS - 1, e.y + chosen.y));
  });
}

function checkEnemyCollision() {
  if (activePowerups.invincible) return false;
  return enemies.some(e => e.x === snake[0].x && e.y === snake[0].y);
}

function tick() {
  if (gameOver) return;

  // Move enemies
  if (gameMode === 'challenge') {
    moveEnemies();
    if (checkEnemyCollision()) {
      loseLife();
      return;
    }
  }

  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    if (!activePowerups.invincible) return handleDie();
    head.x = (head.x + COLS) % COLS;
    head.y = (head.y + ROWS) % ROWS;
  }
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    if (!activePowerups.invincible) return handleDie();
  }

  // Enemy body collision
  for (let i = 1; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y && !activePowerups.invincible) {
      return handleDie();
    }
  }

  snake.unshift(head);

  // Powerup collision
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    if (head.x === p.x && head.y === p.y) {
      activatePowerup(p.type);
      powerups.splice(i, 1);
    }
  }

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    playSFX('eat');
    addParticles(food.x, food.y, foodColor());
    placeFood();

    // Level up
    const prevLevel = challengeLevel;
    for (let i = CLASSIC_LEVELS.length - 1; i >= 0; i--) {
      if (score >= CLASSIC_LEVELS[i]) {
        challengeLevel = i + 1;
        break;
      }
    }
    if (challengeLevel > prevLevel) {
      levelEl.textContent = challengeLevel;
      playSFX('levelup');
      // Speed up
      tickSpeed = Math.max(70, 400 - challengeLevel * 28);
      clearInterval(interval);
      interval = setInterval(tick, tickSpeed);
    } else {
      tickSpeed = Math.max(70, tickSpeed - 3);
      clearInterval(interval);
      interval = setInterval(tick, tickSpeed);
    }

    spawnPowerup();
    // Time Attack: every food eaten spawns a time bonus powerup
    if (gameMode === 'timeAttack') {
      let tx, ty, att = 0;
      do {
        tx = Math.floor(Math.random() * COLS);
        ty = Math.floor(Math.random() * ROWS);
        att++;
      } while ((snake.some(s => s.x === tx && s.y === ty) || (tx === food.x && ty === food.y)) && att < 30);
      if (att < 30) powerups.push({ x: tx, y: ty, type: 'timebonus', life: 150 });
    }
    if (gameMode === 'challenge' && score % 12 === 0 && enemies.length < 2) {
      placeEnemy();
    }
  } else {
    snake.pop();
  }

  updateParticles();
  updateStars();
  draw();
}

function loseLife() {
  playSFX('die');
  lives--;
  livesDisplay.textContent = 'Γ¥ñ∩╕Å'.repeat(Math.max(0, lives));
  addParticles(snake[0].x, snake[0].y, '#ff0000');
  if (lives <= 0) {
    endGame();
  } else {
    // Reset snake
    snake = [{x:15,y:10},{x:14,y:10},{x:13,y:10},{x:12,y:10},{x:11,y:10},{x:10,y:10}];
    dir = {x:1,y:0};
    tickSpeed = Math.max(70, 400 - challengeLevel * 28);
    clearInterval(interval);
    interval = setInterval(tick, tickSpeed);
  }
}

function handleDie() {
  playSFX('die');
  endGame();
}

function endGame() {
  gameOver = true;
  clearInterval(interval);
  clearInterval(timerInterval);
  stopBGM();
  if (score > best) {
    best = score;
    localStorage.setItem('trainBest2', best);
    bestEl.textContent = best;
    msgEl.textContent = '≡ƒÄë NEW RECORD: ' + score;
  } else {
    msgEl.textContent = '≡ƒÆÇ Game Over! Score: ' + score;
  }
  showNameModal(gameMode, score);
  startBtn.disabled = false;
  startBtn.textContent = 'PLAY AGAIN Γû╢';
}

function start() {
  initAudio();
  clearInterval(interval);
  clearInterval(timerInterval);
  init();
  draw();
  interval = setInterval(tick, tickSpeed);
  startBtn.disabled = true;
  startBtn.textContent = 'PLAYING...';
  startBGM();
}

  modeChallengeBtn.style.background = 'linear-gradient(135deg, #ff6b35, #ff2e63)';
  modeChallengeBtn.style.boxShadow = '0 3px 10px #ff6b3566';
  modeClassicBtn.style.background = 'linear-gradient(135deg, #2d3436, #636e72)';
  modeClassicBtn.style.boxShadow = 'none';
  modeTimeAttackBtn.style.background = 'linear-gradient(135deg, #2d3436, #636e72)';
  modeTimeAttackBtn.style.boxShadow = 'none';
});

const modeTimeAttackBtn = document.createElement('button');
modeTimeAttackBtn.textContent = 'ΓÅ▒ Time Attack';
Object.assign(modeTimeAttackBtn.style, btnStyle(false)); // gray
modeTimeAttackBtn.addEventListener('click', () => {
  gameMode = 'timeAttack';
  modeTag.textContent = 'ΓÅ▒ Time Attack';
  modeTimeAttackBtn.style.background = 'linear-gradient(135deg, #ff6b35, #ff2e63)';
  modeTimeAttackBtn.style.boxShadow = '0 3px 10px #ff6b3566';
  modeClassicBtn.style.background = 'linear-gradient(135deg, #2d3436, #636e72)';
  modeClassicBtn.style.boxShadow = 'none';
  modeChallengeBtn.style.background = 'linear-gradient(135deg, #2d3436, #636e72)';
  modeChallengeBtn.style.boxShadow = 'none';
});

modeDiv.append(modeChallengeBtn, modeTimeAttackBtn, modeClassicBtn);
document.body.insertBefore(modeDiv, canvas);

// Keyboard
document.addEventListener('keydown', e => {
  if (gameOver) return;
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': if(dir.y !== 1) dir = {x:0, y:-1}; e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': if(dir.y !== -1) dir = {x:0, y:1}; e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': if(dir.x !== 1) dir = {x:-1, y:0}; e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': if(dir.x !== -1) dir = {x:1, y:0}; e.preventDefault(); break;
  }
});

// Buttons
document.getElementById('btnUp').addEventListener('click', () => { if(dir.y !== 1) dir = {x:0, y:-1}; });
document.getElementById('btnDown').addEventListener('click', () => { if(dir.y !== -1) dir = {x:0, y:1}; });
document.getElementById('btnLeft').addEventListener('click', () => { if(dir.x !== 1) dir = {x:-1, y:0}; });
document.getElementById('btnRight').addEventListener('click', () => { if(dir.x !== -1) dir = {x:1, y:0}; });
startBtn.addEventListener('click', start);

let best = parseInt(localStorage.getItem('trainBest2') || '0');
bestEl.textContent = best;

// Auto-load best from LB
const lbData = getLB();
if (lbData.length > 0 && lbData[0].score > best) {
  best = lbData[0].score;
  bestEl.textContent = best;
}

init(); draw();

function showNameModal(mode, finalScore) {
  document.getElementById('nameScoreText').innerHTML = `α╕äα╕░α╣üα╕Öα╕Ö: <b style="color:#ff6b35;font-size:20px;">${finalScore}</b>`;
  document.getElementById('playerNameInput').value = localStorage.getItem('trainPlayerName') || '';
  document.getElementById('nameOverlay').style.display = 'block';
  document.getElementById('nameModal').style.display = 'block';
  setTimeout(() => document.getElementById('playerNameInput').focus(), 100);

  const submit = () => {
    const name = document.getElementById('playerNameInput').value.trim() || 'Anonymous';
    localStorage.setItem('trainPlayerName', name);
    saveLB(mode, finalScore, name);
    closeNameModal();
  };

  const closeNameModal = () => {
    document.getElementById('nameOverlay').style.display = 'none';
    document.getElementById('nameModal').style.display = 'none';
  };

  document.getElementById('nameSubmit').onclick = submit;
  document.getElementById('nameSkip').onclick = () => { saveLB(mode, finalScore, 'Anonymous'); closeNameModal(); };
  document.getElementById('playerNameInput').onkeydown = (e) => { if (e.key === 'Enter') submit(); if (e.key === 'Escape') { saveLB(mode, finalScore, 'Anonymous'); closeNameModal(); } };
  document.getElementById('nameOverlay').onclick = () => { saveLB(mode, finalScore, 'Anonymous'); closeNameModal(); };
}
</script>
