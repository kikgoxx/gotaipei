<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1b2a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
    touch-action: none;
  }
  h2 { color: #ff6b35; margin-bottom: 4px; text-align: center; }
  #info { display: flex; gap: 20px; margin-bottom: 4px; font-size: 15px; }
  #info span { color: #aaa; }
  #info b { color: #ff6b35; }
  canvas { border: 3px solid #ff6b35; border-radius: 12px; display: block; max-height: 60vh; }
  #msg { margin: 6px 0; font-size: 16px; color: #ff6b35; min-height: 22px; text-align: center; }
  #tapBtn { font-size: 40px; width: 100px; height: 100px; border-radius: 50%; border: none; background: linear-gradient(135deg,#ff6b35,#ff2e63); color: #fff; cursor: pointer; margin: 4px 0; }
  #startBtn { padding: 8px 24px; font-size: 16px; border: none; border-radius: 8px; background: linear-gradient(135deg,#ff6b35,#ff2e63); color: #fff; cursor: pointer; margin-top: 4px; }
  .row { display: flex; gap: 8px; margin-top: 6px; }
  .row button { padding: 5px 14px; font-size: 13px; border: none; border-radius: 8px; cursor: pointer; }
  .hint { font-size: 11px; color: #555; margin-top: 4px; }
  a { color: #a0aec0; text-decoration: none; font-size: 12px; }
  /* Modal */
  #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #1e3a5f; border: 2px solid #ff6b35; border-radius: 16px; padding: 24px; z-index: 100; text-align: center; min-width: 260px; }
  #modal h3 { color: #ff6b35; margin-bottom: 8px; }
  #modal p { color: #ccc; margin-bottom: 12px; }
  #modal input { width: 100%; padding: 8px; border-radius: 8px; border: 2px solid #ff6b35; background: #0d1b2a; color: #fff; font-size: 15px; text-align: center; box-sizing: border-box; margin-bottom: 10px; }
  #modalButtons { display: flex; gap: 8px; }
  #modalButtons button { flex: 1; padding: 8px; border: none; border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; }
  #modalOverlay { display: none; position: fixed; inset: 0; background: #0006; z-index: 99; }
  #lbPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #1e3a5f; border: 2px solid #ff6b35; border-radius: 16px; padding: 20px; z-index: 100; min-width: 260px; }
  #lbPanel h3 { color: #ff6b35; text-align: center; margin-bottom: 12px; }
  #lbPanel table { width: 100%; border-collapse: collapse; }
  #lbPanel td { padding: 4px 8px; font-size: 14px; }
  #lbPanel tr:nth-child(1) td { color: #feca57; }
  #lbPanel tr:nth-child(2) td { color: #dfe6e9; }
  #lbPanel tr:nth-child(3) td { color: #b2bec3; }
  #lbPanel .rank { width: 30px; font-weight: bold; }
  #lbPanel .score { text-align: right; color: #ff6b35; }
  #lbOverlay { display: none; position: fixed; inset: 0; background: #0006; z-index: 99; }
  #lbClose { width: 100%; margin-top: 10px; padding: 8px; background: #555; border: none; border-radius: 8px; color: #fff; cursor: pointer; }
</style>
</head>
<body>
<h2>Flappy Bird</h2>
<div id="info"><span>SCORE: <b id="s">0</b></span> <span>BEST: <b id="b">0</b></span></div>
<canvas id="c" width="420" height="480"></canvas>
<div id="msg">กด START เพื่อเล่น</div>
<button id="tapBtn">TAP</button>
<button id="startBtn">START</button>
<div class="row">
  <button id="lbBtn" style="background:#0984e3;">Leaderboard</button>
  <button id="muteBtn" style="background:#555;">Sound</button>
</div>
<div class="hint">SPACE / TAP = บิน</div>
<div style="margin-top:8px;"><a href="index.html">← หน้าเกม</a></div>

<div id="modalOverlay"></div>
<div id="modal">
  <h3 id="modalTitle">Game Over!</h3>
  <p id="modalScore"></p>
  <input id="nameInput" type="text" maxlength="16" placeholder="ชื่อของคุณ..." />
  <div id="modalButtons">
    <button id="modalSave" style="background:linear-gradient(135deg,#ff6b35,#ff2e63);">บันทึก</button>
    <button id="modalSkip" style="background:#555;">ข้าม</button>
  </div>
</div>

<div id="lbOverlay"></div>
<div id="lbPanel">
  <h3>Leaderboard</h3>
  <table id="lbTable"><tbody></tbody></table>
  <button id="lbClose">ปิด</button>
</div>

<script>
// State
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('s');
const bestEl = document.getElementById('b');
const msgEl = document.getElementById('msg');
const startBtn = document.getElementById('startBtn');
const tapBtn = document.getElementById('tapBtn');

let state = 'idle'; // idle | playing | dead
let score = 0;
let best = parseInt(localStorage.getItem('flappyBest') || '0');
bestEl.textContent = best;

// Bird
const G = 0.12;
const FLAP = -1.8;
let bird = { x: 80, y: 220, vy: 0, w: 34, h: 26 };

// Pipes
let pipes = [];
const PIPE_W = 60;
const PIPE_GAP = 220;
const PIPE_SPEED = 2.2;
const PIPE_SPAWN = 900; // frames
let pipeTimer = 0;

// Ground
let groundX = 0;
const GROUND_Y = 460;

// Clouds
let clouds = [];
for (let i = 0; i < 4; i++) {
  clouds.push({ x: Math.random() * 420, y: 30 + Math.random() * 120, w: 40 + Math.random() * 50, speed: 0.3 + Math.random() * 0.4 });
}

// Audio
let audioCtx = null;
let muted = false;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function play(t) {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  if (t === 'flap') {
    const o = audioCtx.createOscillator();
    o.connect(g); o.type = 'sine';
    o.frequency.setValueAtTime(520, now);
    o.frequency.exponentialRampToValueAtTime(720, now + 0.08);
    g.gain.setValueAtTime(0.2, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    o.start(now); o.stop(now + 0.12);
  } else if (t === 'score') {
    const o = audioCtx.createOscillator();
    o.connect(g); o.type = 'sine';
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.2, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    o.start(now); o.stop(now + 0.2);
  } else if (t === 'die') {
    const o = audioCtx.createOscillator();
    o.connect(g); o.type = 'sawtooth';
    o.frequency.setValueAtTime(300, now);
    o.frequency.exponentialRampToValueAtTime(80, now + 0.4);
    g.gain.setValueAtTime(0.3, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    o.start(now); o.stop(now + 0.5);
  }
}

// Leaderboard
const LB_KEY = 'flappyLB';
function getLB() { try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]'); } catch { return []; } }
function saveLB(sc, nm) {
  const lb = getLB();
  lb.push({ score: sc, name: nm || 'Anonymous', ts: Date.now() });
  lb.sort((a, b) => b.score - a.score);
  lb.splice(20);
  localStorage.setItem(LB_KEY, JSON.stringify(lb));
}
function showLB() {
  const lb = getLB();
  const tb = document.querySelector('#lbTable tbody');
  tb.innerHTML = '';
  if (!lb.length) { tb.innerHTML = '<tr><td colspan=3 style="text-align:center;color:#666;padding:16px;">ยังไม่มีคะแนน</td></tr>'; }
  else lb.slice(0, 10).forEach((e, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="rank">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</td><td style="color:#fff;font-size:13px">${e.name}</td><td class="score">${e.score}</td>`;
    tb.appendChild(tr);
  });
  document.getElementById('lbOverlay').style.display = 'block';
  document.getElementById('lbPanel').style.display = 'block';
}

document.getElementById('lbBtn').addEventListener('click', showLB);
document.getElementById('lbClose').addEventListener('click', () => {
  document.getElementById('lbOverlay').style.display = 'none';
  document.getElementById('lbPanel').style.display = 'none';
});
document.getElementById('lbOverlay').addEventListener('click', () => {
  document.getElementById('lbOverlay').style.display = 'none';
  document.getElementById('lbPanel').style.display = 'none';
});

// Modal controls
document.getElementById('modalSave').addEventListener('click', () => {
  saveLB(score, document.getElementById('nameInput').value.trim() || 'Anonymous');
  document.getElementById('modal').style.display = 'none';
  document.getElementById('modalOverlay').style.display = 'none';
  document.getElementById('nameInput').value = '';
  showLB();
});
document.getElementById('modalSkip').addEventListener('click', () => {
  saveLB(score, 'Anonymous');
  document.getElementById('modal').style.display = 'none';
  document.getElementById('modalOverlay').style.display = 'none';
  showLB();
});
document.getElementById('modalOverlay').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('modalOverlay').style.display = 'none';
});
document.getElementById('muteBtn').addEventListener('click', () => {
  initAudio();
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? 'Mute' : 'Sound';
  document.getElementById('muteBtn').style.background = muted ? '#7f1d1d' : '#555';
});

// Reset
function reset() {
  bird.y = 220; bird.vy = 0;
  pipes = []; pipeTimer = 0;
  score = 0; scoreEl.textContent = 0;
  groundX = 0;
  clouds = [];
  for (let i = 0; i < 4; i++) clouds.push({ x: Math.random() * 420, y: 30 + Math.random() * 120, w: 40 + Math.random() * 50, speed: 0.3 + Math.random() * 0.4 });
}

// Flap
function flap() {
  initAudio();
  bird.vy = FLAP;
  play('flap');
}

// Spawn pipe
function spawnPipe() {
  const minT = 60, maxT = 260;
  const top = minT + Math.random() * (maxT - minT);
  pipes.push({ x: 430, topH: top, botY: top + PIPE_GAP, passed: false });
}

// Draw
function drawBg() {
  const grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grd.addColorStop(0, '#1e3a5f');
  grd.addColorStop(1, '#0d1b2a');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  clouds.forEach(c => {
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w / 2, c.w / 4, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawGround() {
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
  ctx.fillStyle = '#2d5a2d';
  for (let x = (groundX % 80) - 80; x < canvas.width; x += 80) {
    ctx.fillRect(x, GROUND_Y + 20, 40, 4);
    ctx.fillRect(x, GROUND_Y + 36, 40, 4);
  }
  ctx.fillStyle = '#55efc4';
  ctx.fillRect(0, GROUND_Y, canvas.width, 3);
}

function drawBird() {
  ctx.fillStyle = '#feca57';
  ctx.beginPath();
  ctx.ellipse(bird.x + bird.w / 2, bird.y + bird.h / 2, bird.w / 2, bird.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#e17055';
  ctx.beginPath();
  ctx.moveTo(bird.x + bird.w / 2 + 10, bird.y + bird.h / 2 + 2);
  ctx.lineTo(bird.x + bird.w / 2 + 22, bird.y + bird.h / 2 + 5);
  ctx.lineTo(bird.x + bird.w / 2 + 10, bird.y + bird.h / 2 + 8);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(bird.x + bird.w / 2 + 8, bird.y + bird.h / 2 - 3, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(bird.x + bird.w / 2 + 9, bird.y + bird.h / 2 - 3, 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawPipe(p) {
  const g1 = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  g1.addColorStop(0, '#00b894'); g1.addColorStop(0.5, '#00cec9'); g1.addColorStop(1, '#00b894');
  ctx.fillStyle = g1;
  ctx.fillRect(p.x, 0, PIPE_W, p.topH);
  ctx.fillStyle = '#00cec9';
  ctx.fillRect(p.x - 4, p.topH - 20, PIPE_W + 8, 20);
  const g2 = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  g2.addColorStop(0, '#00b894'); g2.addColorStop(0.5, '#00cec9'); g2.addColorStop(1, '#00b894');
  ctx.fillStyle = g2;
  ctx.fillRect(p.x, p.botY, PIPE_W, canvas.height - p.botY);
  ctx.fillRect(p.x - 4, p.botY, PIPE_W + 8, 20);
}

function draw() {
  drawBg();
  pipes.forEach(drawPipe);
  drawGround();
  drawBird();
}

// Game over
function gameOver() {
  state = 'dead';
  play('die');
  if (score > best) {
    best = score;
    localStorage.setItem('flappyBest', best);
    bestEl.textContent = best;
  }
  msgEl.textContent = 'Game Over! คะแนน: ' + score;
  startBtn.textContent = 'RETRY';
  startBtn.disabled = false;
  document.getElementById('modalScore').textContent = 'คะแนน: ' + score;
  document.getElementById('modal').style.display = 'block';
  document.getElementById('modalOverlay').style.display = 'block';
  document.getElementById('nameInput').focus();
}

// Start game
function startGame() {
  initAudio();
  document.getElementById('modal').style.display = 'none';
  document.getElementById('modalOverlay').style.display = 'none';
  if (state === 'dead') {
    bird.y = 220; bird.vy = 0;
    pipes = []; pipeTimer = 0;
    score = 0; scoreEl.textContent = 0;
    groundX = 0;
  }
  state = 'playing';
  msgEl.textContent = '';
  startBtn.textContent = 'PLAYING...';
  startBtn.disabled = true;
  flap();
}

// Controls
startBtn.addEventListener('click', () => {
  if (startBtn.disabled) return;
  if (state === 'idle' || state === 'dead') startGame();
});

tapBtn.addEventListener('click', e => {
  e.stopPropagation();
  initAudio();
  if (state === 'idle' || state === 'dead') startGame();
  else if (state === 'playing') flap();
});

canvas.addEventListener('click', () => {
  initAudio();
  if (state === 'idle' || state === 'dead') startGame();
  else if (state === 'playing') flap();
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (state === 'idle' || state === 'dead') startGame();
    else if (state === 'playing') flap();
  }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  if (state === 'idle' || state === 'dead') startGame();
  else if (state === 'playing') flap();
}, { passive: false });

// Loop
function loop() {
  if (state === 'playing') {
    bird.vy += G;
    bird.y += bird.vy;
    groundX -= PIPE_SPEED;
    clouds.forEach(c => { c.x -= c.speed; if (c.x + c.w < 0) c.x = canvas.width + c.w; });
    pipeTimer++;
    if (pipeTimer >= PIPE_SPAWN / 16.67) { pipeTimer = 0; spawnPipe(); }
    pipes.forEach(p => { p.x -= PIPE_SPEED; });
    pipes = pipes.filter(p => p.x + PIPE_W > -10);
    if (bird.y + bird.h >= GROUND_Y) { draw(); gameOver(); requestAnimationFrame(loop); return; }
    pipes.forEach(p => {
      if (bird.x + bird.w > p.x && bird.x < p.x + PIPE_W) {
        if (bird.y < p.topH || bird.y + bird.h > p.botY) { draw(); gameOver(); requestAnimationFrame(loop); return; }
      }
      if (!p.passed && p.x + PIPE_W < bird.x) { p.passed = true; score++; scoreEl.textContent = score; play('score'); }
    });
  }
  draw();
  requestAnimationFrame(loop);
}

// Init
draw();
requestAnimationFrame(loop);
</script>
</body>
</html>
